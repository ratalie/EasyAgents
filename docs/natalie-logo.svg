  <circle cx="85" cy="105" r="12" fill="none" stroke="#DC143C" stroke-width="3"/>
  <circle cx="115" cy="105" r="12" fill="none" stroke="#DC143C" stroke-width="3"/>
  <line x1="97" y1="105" x2="103" y2="105" stroke="#DC143C" stroke-width="3"/>
  
  <!-- Eyes (closed/happy) -->
