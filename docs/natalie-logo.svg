  <!-- Blazer lapels -->
  <path d="M70 150 L85 160 L85 145 Q75 145 70 150 Z" fill="#808080"/>
  <path d="M130 150 L115 160 L115 145 Q125 145 130 150 Z" fill="#808080"/>
  
