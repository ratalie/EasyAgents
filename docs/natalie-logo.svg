<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Blue background circle -->
  <circle cx="100" cy="100" r="100" fill="#4A90A4"/>
  
  <!-- Face -->
  <ellipse cx="100" cy="120" rx="45" ry="50" fill="#D2691E"/>
  
  <!-- Hair -->
  <path d="M55 80 Q55 50 100 50 Q145 50 145 80 Q145 100 140 120 Q135 140 125 150 L75 150 Q65 140 60 120 Q55 100 55 80 Z" fill="#2F2F2F"/>
  
